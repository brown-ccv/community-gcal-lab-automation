# GitHub Actions workflow for deploying to Google Cloud Run
# Three-phase design: prepare → deploy → teardown
# Trigger: Manual workflow dispatch with environment selection

name: 🚀 Deploy to Google Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: 'staging'
      region:
        description: 'GCP region (must specify due to org policy)'
        required: true
        type: choice
        options:
          - us-east1
          - us-east4
          - us-central1
        default: 'us-east1'

env:
  SERVICE_NAME: gcal-lab-automation
  GCP_REGION: ${{ github.event.inputs.region }}
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # Phase 1: PREPARE - Validation, setup, and authentication
  # ============================================================================
  prepare:
    name: 🔍 Prepare Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    outputs:
      project-id: ${{ steps.auth.outputs.project_id }}
      service-account: ${{ steps.validate.outputs.service_account }}
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🧪 Run test gate
        run: |
          npm ci
          npm test
        
      - name: 🔐 Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          
      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.auth.outputs.project_id }}
          
      - name: ✅ Validate configuration
        id: validate
        run: |
          echo "🔍 Validating GCP configuration..."
          
          # Check if project is accessible
          PROJECT_ID=$(gcloud config get-value project)
          echo "project_id=${PROJECT_ID}" >> $GITHUB_OUTPUT
          echo "✅ Project ID: ${PROJECT_ID}"
          
          # Verify service account exists
          SA_EMAIL="${{ env.SERVICE_NAME }}-sa@${PROJECT_ID}.iam.gserviceaccount.com"
          if gcloud iam service-accounts describe "${SA_EMAIL}" &>/dev/null; then
            echo "✅ Service account exists: ${SA_EMAIL}"
            echo "service_account=${SA_EMAIL}" >> $GITHUB_OUTPUT
          else
            echo "❌ Service account not found: ${SA_EMAIL}"
            echo "💡 Run .deployment/scripts/gcp/setup-service-account.sh first"
            exit 1
          fi
          
          # Check required APIs
          echo "🔍 Checking required APIs..."
          REQUIRED_APIS=("run.googleapis.com" "cloudbuild.googleapis.com" "artifactregistry.googleapis.com")
          for API in "${REQUIRED_APIS[@]}"; do
            if gcloud services list --enabled --filter="name:${API}" --format="value(name)" | grep -q "${API}"; then
              echo "✅ API enabled: ${API}"
            else
              echo "⚠️  API not enabled: ${API}"
              echo "🔄 Enabling ${API}..."
              gcloud services enable "${API}"
            fi
          done
          
          echo "✅ All validations passed!"
          
      - name: 🔍 Check secrets configuration
        run: |
          echo "🔍 Validating secrets setup..."
          
          # These secrets should exist in GCP Secret Manager
          PROJECT_ID=$(gcloud config get-value project)
          
          SECRETS=("session-secret" "reminder-calendar-id" "retention-calendar-id" "required-google-group" "google-admin-user-email" "google-admin-sa-json")
          
          for SECRET in "${SECRETS[@]}"; do
            if gcloud secrets describe "${SECRET}" --project="${PROJECT_ID}" &>/dev/null; then
              echo "✅ Secret exists: ${SECRET}"
            else
              echo "⚠️  Secret not found: ${SECRET}"
            fi
          done
          
          echo "💡 If secrets are missing, run .deployment/scripts/gcp/setup-gcp-secrets.sh"

  # ============================================================================
  # Phase 2: DEPLOY - Build, push, and deploy to Cloud Run
  # ============================================================================
  deploy:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔐 Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          
      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ needs.prepare.outputs.project-id }}
          
      - name: 🔧 Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
          
      - name: 📦 Create Artifact Registry if needed
        run: |
          REPO_NAME="cloud-run-source-deploy"
          PROJECT_ID="${{ needs.prepare.outputs.project-id }}"
          
          if gcloud artifacts repositories describe "${REPO_NAME}" \
            --location="${{ env.GCP_REGION }}" \
            --project="${PROJECT_ID}" &>/dev/null; then
            echo "✅ Artifact Registry already exists"
          else
            echo "🔄 Creating Artifact Registry..."
            gcloud artifacts repositories create "${REPO_NAME}" \
              --repository-format=docker \
              --location="${{ env.GCP_REGION }}" \
              --description="Docker repository for Cloud Run deployments" \
              --project="${PROJECT_ID}"
            echo "✅ Artifact Registry created"
          fi
          
      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .deployment/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.project-id }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.project-id }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:latest
          
      - name: 🚀 Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.project-id }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --service-account=${{ needs.prepare.outputs.service-account }}
            --no-allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --timeout=300
            --min-instances=0
            --max-instances=1
          env_vars: |
            NODE_ENV=production
            DEMO_MODE=false
            BYPASS_AUTH=false
            AUTH_MODE=proxy
            ALLOWED_DOMAIN=brown.edu
            REQUIRE_GROUP_MEMBERSHIP=true
          secrets: |
            SESSION_SECRET=session-secret:latest
            REMINDER_CALENDAR_ID=reminder-calendar-id:latest
            RETENTION_CALENDAR_ID=retention-calendar-id:latest
            REQUIRED_GOOGLE_GROUP=required-google-group:latest
            GOOGLE_ADMIN_USER_EMAIL=google-admin-user-email:latest
            GOOGLE_ADMIN_SERVICE_ACCOUNT_JSON=google-admin-sa-json:latest

      - name: 🟢 Set up Node.js for smoke checks
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 🏥 Health check
        if: success()
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "🏥 Checking service health..."
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="${SERVICE_URL}")
          
          # Wait for service to be ready
          sleep 10
          
          # Try health check with retries
          MAX_RETRIES=5
          RETRY=0
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${ID_TOKEN}" "${SERVICE_URL}/health" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP ${HTTP_CODE})"
              exit 0
            fi
            
            RETRY=$((RETRY+1))
            echo "⚠️  Health check failed (HTTP ${HTTP_CODE}), retry ${RETRY}/${MAX_RETRIES}..."
            sleep 5
          done
          
          echo "❌ Health check failed after ${MAX_RETRIES} retries"
          exit 1

      - name: 🔐 Auth smoke checks
        if: success()
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
          AUTH_MODE: proxy
        run: |
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="${SERVICE_URL}")
          ID_TOKEN="${ID_TOKEN}" node scripts/verify-deployment.mjs
          
      - name: 📊 Deployment summary
        if: always()
        run: |
          echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.GCP_REGION }}-docker.pkg.dev/${{ needs.prepare.outputs.project-id }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Phase 3: TEARDOWN - Cleanup and rollback on failure
  # ============================================================================
  teardown:
    name: 🧹 Teardown
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always() && failure()
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          
      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ needs.prepare.outputs.project-id }}
          
      - name: 🔄 Rollback on failure
        if: failure()
        run: |
          echo "⚠️  Deployment failed, checking if rollback is needed..."
          
          PROJECT_ID="${{ needs.prepare.outputs.project-id }}"
          
          # Get current revision
          CURRENT_REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region="${{ env.GCP_REGION }}" \
            --project="${PROJECT_ID}" \
            --format="value(status.latestReadyRevisionName)" 2>/dev/null || echo "")
          
          if [ -z "$CURRENT_REVISION" ]; then
            echo "ℹ️  No previous deployment found, nothing to roll back"
            exit 0
          fi
          
          # Get previous revision
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region="${{ env.GCP_REGION }}" \
            --project="${PROJECT_ID}" \
            --format="value(name)" \
            --sort-by="~creationTimestamp" \
            --limit=2 | tail -n 1)
          
          if [ -n "$PREVIOUS_REVISION" ] && [ "$PREVIOUS_REVISION" != "$CURRENT_REVISION" ]; then
            echo "🔄 Rolling back to previous revision: ${PREVIOUS_REVISION}"
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region="${{ env.GCP_REGION }}" \
              --project="${PROJECT_ID}" \
              --to-revisions="${PREVIOUS_REVISION}=100"
            echo "✅ Rollback completed"
          else
            echo "ℹ️  No previous revision available for rollback"
          fi
          
      - name: 📝 Post failure notification
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment to ${{ github.event.inputs.environment }} failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Troubleshooting Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the deployment logs artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify all secrets are configured in GCP Secret Manager" >> $GITHUB_STEP_SUMMARY
          echo "3. Ensure service account has required permissions" >> $GITHUB_STEP_SUMMARY
          echo "4. Check Cloud Run logs: \`gcloud run logs read --service=${{ env.SERVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
